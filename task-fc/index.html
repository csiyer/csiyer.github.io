<!DOCTYPE html>
<html>

<head>
    <title>Memory Experiment</title>
    <!-- jsPsych 7.x -->
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-instructions@1.1.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-image-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-canvas-button-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-canvas-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-preload@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe"></script>
    <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css">

    <style>
        body {
            background-color: #f0f0f0;
            /* Fallback */
            color: #000000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .jspsych-display-element {
            font-size: 1.2rem;
        }

        .consent-container {
            max-width: 800px;
            text-align: left;
            margin: 0 auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .color-wheel-canvas {
            cursor: crosshair;
            display: block;
            margin: 0 auto;
        }

        .jspsych-content-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <script src="params.js"></script>

    <!-- Load parameters and task logic -->
    <script type="module">
        import { initTask } from './task.js';

        // Initialize jsPsych with default body positioning
        const jsPsych = initJsPsych({
            on_finish: function () {
                // Handle final redirection or data summary
            }
        });

        // Apply theme from params
        document.body.style.backgroundColor = params.background_color;
        document.body.style.color = params.text_color;

        // Add participant ID to data
        const subject_id = jsPsych.randomization.randomID(10);
        jsPsych.data.addProperties({
            subject_id: subject_id,
            prolific_id: jsPsych.data.getURLVariable('PROLIFIC_PID'),
            study_id: params.prolific_study_id
        });

        initTask(jsPsych, subject_id);
    </script>
</body>

</html>
